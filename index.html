<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MTA Emozioni in Festa</title>
<meta name="description" content="Sala feste a Taranto con animazione, mascotte e gonfiabili per compleanni bambini.">

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#fff8f0,#fef6ff,#eef9ff);
  overflow-x:hidden;
}

/* MENU */
.menu {
  position:sticky;
  top:0;
  background:white;
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
  z-index:999;
}
.menu a {text-decoration:none;color:black;font-weight:bold;}

/* HEADER */
.header {
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:30px 20px;
  background:white;
}

.logo-img {
  position:absolute;
  left:20px;
  width:70px;
}

.logo-text {
  font-size:50px;
  font-weight:bold;
  text-align:center;
  animation: floatText 3s infinite;
}

.logo-text span {
  background: linear-gradient(45deg,#ff7eb3,#ffb347,#00c9ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

@keyframes floatText {
  0%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
  100%{transform:translateY(0);}
}

/* HERO */
.hero {
  background:url('sfondo.jpg') center/cover no-repeat;
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  text-align:center;
  position:relative;
}

.hero::after {
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.hero-content {
  position:relative;
  z-index:2;
}

/* BUTTON */
.btn {
  padding:15px 30px;
  background:#ffb347;
  color:white;
  text-decoration:none;
  border-radius:30px;
}

.whatsapp-btn {
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  50% {transform:scale(1.1);}
}

/* SEZIONI */
.section {
  padding:60px 20px;
  text-align:center;
}

/* SERVIZI */
.services {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:20px;
}

.service {
  background:white;
  width:250px;
  border-radius:15px;
  overflow:hidden;
}

.service img {
  width:100%;
  height:150px;
  object-fit:cover;
}

/* GALLERIA */
.gallery-pro {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
}

.gallery-pro img {
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

/* POPUP */
#popup {
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
}

#popup img {
  max-width:90%;
}

/* RECENSIONI */
.review {
  background:white;
  padding:20px;
  margin:10px;
}

/* PREZZI */
.price-box {
  background:white;
  padding:20px;
  margin:10px;
}

/* WHATSAPP */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  color:white;
  padding:15px;
  border-radius:50%;
}

/* BALLOONS */
.balloons img {
  position:fixed;
  bottom:-120px;
  width:60px;
  opacity:0.7;
  animation: floatUp linear infinite;
}

.balloons img:nth-child(1){left:10%;animation-duration:12s;}
.balloons img:nth-child(2){left:35%;animation-duration:15s;}
.balloons img:nth-child(3){left:60%;animation-duration:13s;}
.balloons img:nth-child(4){left:85%;animation-duration:16s;}

@keyframes floatUp {
  100% {transform:translateY(-120vh);}
}

/* CONFETTI */
.confetti::before {
  content:"• • • • • • •";
  position:fixed;
  width:100%;
  animation: fall 12s infinite;
  opacity:0.2;
}

@keyframes fall {
  100% {transform:translateY(100vh);}
}
</style>
</head>

<body>

<img src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png">

</div>

</div>

<div class="hero">

</div>
</div>

<div class="services">

<div class="service"><img src="compleanni.jpg"><h3>Compleanni</h3></div>
<div class="service"><img src="mascotte.jpg"><h3>Mascotte</h3></div>
<div class="service"><img src="noleggio-mascotte.jpg"><h3>Noleggio Mascotte</h3></div>
<div class="service"><img src="allestimenti.jpg"><h3>Allestimenti</h3></div>
<div class="service"><img src="gonfiabili.jpg"><h3>Gonfiabili</h3></div>
<div class="service"><img src="animazione.jpg"><h3>Animazione</h3></div>

</div>
</div>

</body>
</html>
